    <style>
        :root {
            --brand-green-light: #cce4c5; 
            --brand-green-cta: #166534; 
            --brand-dark: #0c0d0e;        
            --bg-neutral: #f8fafc;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --blue-b2b: #1e3a8a;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-neutral); color: var(--brand-dark); }
        
        /* MENÚ DE NAVEGACIÓN SUPERIOR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 5%;
            background: white;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            text-decoration: none; 
            color: var(--brand-dark); 
            font-weight: 800; 
            font-size: 26px; 
            letter-spacing: -0.5px;
        }
        
        .logo-img { width: 48px; height: 48px; object-fit: contain; display: block; }
        .menu-links { display: flex; list-style: none; gap: 12px; align-items: center; }
        .menu-links a { text-decoration: none; color: var(--brand-dark); font-weight: 600; font-size: 0.95rem; padding: 8px 14px; border-radius: 6px; transition: all 0.2s ease; }
        .menu-links a:hover { background: #f1f5f9; }
        .menu-links .btn-cotizador { background-color: var(--brand-green-cta); color: white; padding: 10px 20px; border-radius: 8px; font-weight: 600; box-shadow: 0 2px 8px rgba(22, 101, 52, 0.15); margin-left: 8px; }

        /* SECCIÓN DEL COTIZADOR PRINCIPAL */
        .cotizador-section { padding: 80px 5%; max-width: 1000px; margin: 0 auto; }
        .cotizador-header { text-align: center; margin-bottom: 40px; }
        .cotizador-header h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; color: var(--blue-b2b); }
        .cotizador-header p { color: var(--text-muted); font-size: 1.1rem; }

        .cotizador-container {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        /* ARQUITECTURA DEL CENTRO DE COTIZACIONES */
        .quote-architecture {
            background: #ffffff;
        }
        .quote-steps-nav {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 16px;
            margin-bottom: 30px;
        }
        .step-pill { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .step-pill.active { color: var(--brand-green-cta); border-bottom: 2px solid var(--brand-green-cta); padding-bottom: 16px; margin-bottom: -18px; }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.85rem; font-weight: 700; color: var(--brand-dark); }
        .form-group select, .form-group input { padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.95rem; background-color: #fff; }
        
        .btn-next {
            grid-column: span 2;
            background: var(--brand-green-cta);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            margin-top: 16px;
            font-size: 1rem;
            transition: background 0.2s ease;
        }
        .btn-next:hover {
            background: #114f29;
        }
